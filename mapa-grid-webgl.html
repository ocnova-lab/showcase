<title>Mapa Grid — WebGL</title>
<style>
  html, body { margin: 0; }
  body { background: #ffffff; overflow-x: hidden; font-family: ui-sans-serif, -apple-system, "Segoe UI", Arial, sans-serif; }

  /* полотно на весь экран, контент рисует WebGL; #spacer держит высоту документа для нативного скролла */
  #gl { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; z-index: 0; }
  #spacer { position: relative; width: 100%; pointer-events: none; }

  /* ---------- панель управления (DOM) ---------- */
  .fab {
    position: fixed; left: 20px; bottom: 20px; z-index: 40;
    width: 44px; height: 44px; border-radius: 50%;
    border: 1px solid rgba(0,0,0,.12); background: #fff; box-shadow: 0 4px 16px rgba(0,0,0,.14);
    display: flex; align-items: center; justify-content: center; cursor: pointer; color: #1c1b18;
  }
  .fab svg { width: 20px; height: 20px; }

  .panel {
    position: fixed; left: 20px; bottom: 76px; z-index: 40;
    width: 320px; max-width: calc(100vw - 40px);
    background: #fff; border: 1px solid rgba(0,0,0,.12); border-radius: 10px;
    box-shadow: 0 10px 40px rgba(0,0,0,.16); padding: 16px 18px 18px;
    font-size: 15px; color: #1c1b18;
  }
  .panel[hidden] { display: none; }
  .panel__head { font-family: ui-monospace, Menlo, monospace; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: #8a887f; margin: 0 0 14px; }
  .panel__row { display: grid; grid-template-columns: 1fr auto; gap: 4px 10px; margin-bottom: 16px; }
  .panel__row .lab { font-size: 13px; }
  .panel__row .val { font-family: ui-monospace, Menlo, monospace; font-size: 13px; color: #55534c; display: inline-flex; align-items: baseline; gap: 3px; }
  .panel__row .val input { width: 52px; text-align: right; font: inherit; color: #1c1b18; border: 1px solid rgba(0,0,0,.14); border-radius: 5px; padding: 2px 5px; background: #fafafa; }
  .panel__row input[type="range"] { grid-column: 1 / -1; width: 100%; margin: 2px 0 0; accent-color: #9c4a34; cursor: pointer; }
  .panel__row--bg .val { align-items: center; gap: 6px; }
  .panel__row--bg .hex { width: 78px; text-align: left; text-transform: uppercase; font-family: ui-monospace, Menlo, monospace; font-size: 13px; border: 1px solid rgba(0,0,0,.14); border-radius: 5px; padding: 2px 6px; background: #fafafa; color:#1c1b18; }
  .panel__row--bg input[type="color"] { width: 28px; height: 28px; padding: 0; border: 1px solid rgba(0,0,0,.16); border-radius: 6px; background: none; cursor: pointer; }
  .panel__foot { display: flex; align-items: center; justify-content: space-between; margin-top: 18px; padding-top: 14px; border-top: 1px solid rgba(0,0,0,.08); }
  .panel__foot label { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; cursor: pointer; }
  .panel__foot input { accent-color: #9c4a34; }
  .panel__foot .reset { font: inherit; font-size: 12px; color: #9c4a34; background: none; border: none; cursor: pointer; }
</style>

<canvas id="gl"></canvas>
<div id="spacer"></div>

<button class="fab" id="fab" aria-label="Панель управления">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
    <line x1="4" y1="7" x2="20" y2="7"/><circle cx="9" cy="7" r="2.4" fill="#fff"/>
    <line x1="4" y1="14" x2="20" y2="14"/><circle cx="15" cy="14" r="2.4" fill="#fff"/>
    <line x1="4" y1="21" x2="20" y2="21"/><circle cx="8" cy="21" r="2.4" fill="#fff"/>
  </svg>
</button>

<aside class="panel" id="panel" hidden>
  <p class="panel__head">Параметры сетки · WebGL</p>
  <div class="panel__row" data-p="mod"><span class="lab">Размер модуля</span><span class="val"><input type="number" min="100" max="900" step="10"> <span class="u">px</span></span><input type="range" min="100" max="900" step="10"></div>
  <div class="panel__row" data-p="gap"><span class="lab">Просвет между строками</span><span class="val"><input type="number" min="0" max="1600" step="10"> <span class="u">px</span></span><input type="range" min="0" max="1600" step="10"></div>
  <div class="panel__row" data-p="offset"><span class="lab">Смещение внутри строки</span><span class="val"><input type="number" min="0" max="900" step="10"> <span class="u">px</span></span><input type="range" min="0" max="900" step="10"></div>
  <div class="panel__row" data-p="rows"><span class="lab">Количество строк</span><span class="val"><input type="number" min="1" max="12" step="1"> <span class="u">шт</span></span><input type="range" min="1" max="12" step="1"></div>
  <div class="panel__row" data-p="strength"><span class="lab">Сила параллакса</span><span class="val"><input type="number" min="0" max="100" step="5"> <span class="u">%</span></span><input type="range" min="0" max="100" step="5"></div>
  <div class="panel__row panel__row--bg"><span class="lab">Цвет фона</span><span class="val"><input type="text" id="bgHex" class="hex" value="#FFFFFF" spellcheck="false" maxlength="7"><input type="color" id="bgColor" value="#ffffff"></span></div>
  <div class="panel__foot"><label><input id="parallax" type="checkbox" checked> параллакс</label><button class="reset" id="reset" type="button">сбросить</button></div>
</aside>

    var ink = bg.dark ? '#ededea' : '#1c1b18', inkSoft = bg.dark ? '#adaa9f' : '#55534c';
    var c = document.createElement('canvas'), ctx = c.getContext('2d');
    var tf = '12px ui-monospace, Menlo, monospace', sf = '13px ui-sans-serif, -apple-system, Arial';
    ctx.font = tf; var w1 = ctx.measureText(cell.title).width;
    ctx.font = sf; var w2 = ctx.measureText(cell.sub).width;
    var w = Math.ceil(Math.max(w1, w2)) + 2, lh = 18, h = lh * 2 + 4;
    c.width = Math.ceil(w * DPR); c.height = Math.ceil(h * DPR);
    ctx.scale(DPR, DPR); ctx.textBaseline = 'top';
    ctx.fillStyle = ink; ctx.font = tf; ctx.fillText(cell.title, 0, 2);
    ctx.fillStyle = inkSoft; ctx.font = sf; ctx.fillText(cell.sub, 0, 2 + lh);
    if (cell.textTex) gl.deleteTexture(cell.textTex);
    cell.textTex = texFromCanvas(c); cell.textW = w; cell.textH = h;
  }
  function rebuildAllText() { for (var i = 0; i < CELLS.length; i++) buildTextTex(CELLS[i]); }

  // рисуем один прямоугольник (в CSS-пикселях экрана) с текстурой
  var verts = new Float32Array(24);
  function quad(px, py, w, h, tex, alpha) {
    var x0 = px / CW * 2 - 1, x1 = (px + w) / CW * 2 - 1;
    var y0 = 1 - py / CH * 2, y1 = 1 - (py + h) / CH * 2;
    verts.set([x0, y0, 0, 1,  x1, y0, 1, 1,  x0, y1, 0, 0,  x0, y1, 0, 0,  x1, y0, 1, 1,  x1, y1, 1, 0]);
    gl.bufferData(gl.ARRAY_BUFFER, verts, gl.DYNAMIC_DRAW);
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.uniform1f(uAlpha, alpha);
    gl.drawArrays(gl.TRIANGLES, 0, 6);
  }

  function parallaxDy(screenY, vh, amp) {
    var t = screenY / vh;
    if (t <= 0 || t >= 1) return 0;
    return amp * (Math.cos(2 * Math.PI * t) - 1) / 2;   // гладко на кромках экрана
  }

  function docHeight() {
    var rs = params.mod + params.offset + params.gap;
    return BASE + (params.rows - 1) * rs + params.offset + params.mod + 120;
  }
  function syncSpacer() { document.getElementById('spacer').style.height = Math.round(docHeight()) + 'px'; }

  function render() {
    gl.clearColor(bg.r, bg.g, bg.b, 1); gl.clear(gl.COLOR_BUFFER_BIT);
    var mod = params.mod, rows = params.rows, vh = CH;
    var step = Math.max(0, (CW - 2 * PAD - mod) / (COLS - 1));
    var rs = mod + params.offset + params.gap;
    var amp = (params.strength / 100) * vh * 0.3;
    var scrollY = window.pageYOffset || document.documentElement.scrollTop || 0;

    for (var i = 0; i < CELLS.length; i++) {
      var c = CELLS[i];
      if (c.row >= rows || !c.tex) continue;
      var rowTop = BASE + c.row * rs;
      var screenY = rowTop - scrollY;
      var dy = params.parallax ? parallaxDy(screenY, vh, amp) : 0;
      var mY = screenY + dy + ((c.col === 3 || c.col === 4) ? params.offset : 0);
      if (mY > vh + mod || mY + mod < -mod) continue;         // за экраном — пропускаем
      var mX = PAD + (c.col - 1) * step;

      // FIT
      var px, py, pw, ph;
      if (c.ar >= 0.999) { pw = mod; ph = mod / c.ar; px = mX; py = mY + (mod - ph); }         // гориз/квадрат → низ
      else { ph = mod; pw = mod * c.ar; py = mY; px = (c.col <= 2) ? mX : mX + (mod - pw); }    // вертикаль → лево/право
      quad(px, py, pw, ph, c.tex, 1);

      // подпись от левого края фото
      if (c.textTex) quad(px, mY + mod + 14, c.textW, c.textH, c.textTex, 1);
    }
  }

  var rafR;
  function requestRender() { cancelAnimationFrame(rafR); rafR = requestAnimationFrame(render); }
  window.addEventListener('scroll', requestRender, { passive: true });   // перерисовка на скролле (параллакс)

  // ---- загрузка фото ----
  function loadImg(src) { return new Promise(function (res) { var im = new Image(); im.onload = function () { res(im); }; im.onerror = function () { res(null); }; im.src = src; }); }
  var keys = Object.keys(IMAGES), texByKey = {}, arByKey = {};
  Promise.all(keys.map(function (k) { return loadImg(IMAGES[k]).then(function (im) { if (im) { texByKey[k] = texFromImage(im); arByKey[k] = im.naturalWidth / im.naturalHeight; } }); }))
    .then(function () {
      for (var i = 0; i < CELLS.length; i++) { CELLS[i].tex = texByKey[CELLS[i].img]; CELLS[i].ar = arByKey[CELLS[i].img] || 1; }
      resize(); rebuildAllText(); syncSpacer();
      requestRender();
    });

  window.addEventListener('resize', function () { resize(); rebuildAllText(); requestRender(); });
  syncSpacer();
  resize();

  // ---------- панель ----------
  function syncInputs() {
    ['mod', 'gap', 'offset', 'rows', 'strength'].forEach(function (p) {
      var row = document.querySelector('.panel__row[data-p="' + p + '"]');
      row.querySelector('input[type="range"]').value = params[p];
      row.querySelector('input[type="number"]').value = params[p];
    });
  }
  function setParam(p, v) {
    v = parseInt(v, 10); if (isNaN(v)) return;
    var range = document.querySelector('.panel__row[data-p="' + p + '"] input[type="range"]');
    v = Math.max(+range.min, Math.min(+range.max, v));
    params[p] = v; syncInputs(); syncSpacer(); requestRender();
  }
  ['mod', 'gap', 'offset', 'rows', 'strength'].forEach(function (p) {
    var row = document.querySelector('.panel__row[data-p="' + p + '"]');
    row.querySelector('input[type="range"]').addEventListener('input', function () { setParam(p, this.value); });
    row.querySelector('input[type="number"]').addEventListener('input', function () { setParam(p, this.value); });
  });
  syncInputs();

  var bgColor = document.getElementById('bgColor'), bgHex = document.getElementById('bgHex');
  function setBg(v) {
    v = String(v).trim(); if (v[0] !== '#') v = '#' + v;
    if (!/^#[0-9a-fA-F]{6}$/.test(v)) return;
    var R = parseInt(v.substr(1, 2), 16), G = parseInt(v.substr(3, 2), 16), B = parseInt(v.substr(5, 2), 16);
    bg.r = R / 255; bg.g = G / 255; bg.b = B / 255; bg.dark = (0.299 * R + 0.587 * G + 0.114 * B) / 255 < 0.55;
    bgColor.value = v; bgHex.value = v.toUpperCase();
    document.body.style.background = v;
    rebuildAllText(); requestRender();
  }
  bgColor.addEventListener('input', function () { setBg(this.value); });
  bgHex.addEventListener('input', function () { setBg(this.value); });

  document.getElementById('parallax').addEventListener('change', function (e) { params.parallax = e.target.checked; requestRender(); });
  document.getElementById('reset').addEventListener('click', function () {
    params.mod = DEFAULTS.mod; params.gap = DEFAULTS.gap; params.offset = DEFAULTS.offset;
    params.rows = DEFAULTS.rows; params.strength = DEFAULTS.strength; params.parallax = DEFAULTS.parallax;
    document.getElementById('parallax').checked = DEFAULTS.parallax;
    setBg('#ffffff'); syncInputs(); syncSpacer(); requestRender();
  });

  var panel = document.getElementById('panel'), fab = document.getElementById('fab');
  fab.addEventListener('click', function () { panel.hidden = !panel.hidden; });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') panel.hidden = true; });
})();
</script>
