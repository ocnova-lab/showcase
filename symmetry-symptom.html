<!doctype html>

<title>Лента symmetrysymptom — стенд: импульс + Flip</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0c0c0d; }

  /* Лента. Геометрия морфа выводится из одной переменной --m (0 = полный режим, 1 = мини),
     которую ведёт JS тем же циклом, что и сдвиг ленты, — одни часы, прыжков нет по построению */
  #ribbon { --m: 0; position: absolute; left: 0; top: 0; width: 100%;
            margin: 0; padding: 0; list-style: none;
            will-change: transform; pointer-events: none; }

  #ribbon li { height: calc((1 - var(--m)) * 100vh + var(--m) * 110px);
               display: flex; align-items: center; justify-content: center; }

  /* Ячейка кадра: в полном режиме fit по высоте экрана (ширина из пропорции кадра --ar),
     в мини — контейнер 300×100, фото режется под fill */
  .cell { width: calc((1 - var(--m)) * (100vh * var(--ar, 1)) + var(--m) * 300px);
          height: calc((1 - var(--m)) * 100vh + var(--m) * 100px);
          max-width: 100vw;
          transition: transform 600ms ease, opacity 300ms ease; }
  .cell img { width: 100%; height: 100%; object-fit: cover; display: block; }

  #ribbon.mini li { perspective: 400px; }

  /* Эффект Flip из stroll.css: rotateX ±80° + гашение; ось повёрнута на центр полосы */
  #ribbon.mini li.past .cell   { transform-origin: 50% 100%; transform: rotateX(80deg);  opacity: 0; }
  #ribbon.mini li.future .cell { transform-origin: 50% 0%;   transform: rotateX(-80deg); opacity: 0; }

  /* Датчик выбора: рамка на кадре, ближайшем к центру */
  #ribbon.mini li.current .cell { outline: 1px solid rgba(255,255,255,.7); outline-offset: 3px; }

  /* Невидимые боковые зоны навигации */
  .zone { position: fixed; top: 0; bottom: 0; width: 100px; z-index: 10; }
  #zoneL { left: 0; }
  #zoneR { right: 0; }

  #hud { position: fixed; left: 14px; bottom: 12px; z-index: 20;
         font: 12px/1 ui-monospace, SFMono-Regular, monospace;
         color: rgba(255,255,255,.55); letter-spacing: .08em;
         user-select: none; pointer-events: none; }
</style>

189767351140352.jpg", "631202711111630848.jpg", "631202772653670400.jpg", "631208815941025792.jpg", "631211377918427136.jpg", "631211474250039296.jpg", "631216296250474496.jpg", "631216394513612800.jpg", "631220926070063104.jpg", "631231706207338497.png", "631249077974204416.png", "631249161394716672.jpg", "631249313888174081.jpg", "631253589270102016.jpg", "631255763607830528.jpg", "631298800751902720.jpg", "631322085512380416.jpg", "631325832638529536.jpg", "631325951529287680.png", "631326024681111552.png", "631327674313457664.png", "631336927517442048.jpg", "631336970988257280.jpg", "631337001187164160.jpg", "631337018598817792.jpg", "631337044289929216.png", "631346364698279936.jpg", "631353594778664960.png", "631779202026340352.jpg", "631867034542768128.jpg", "631867069250600960.jpg", "631867097488736256.gif", "631867205928288256.jpg", "632071751014187008.jpg", "632108468056326144.png", "632115517905321984.jpg", "632115650850111488.jpg", "632115772028796928.jpg", "632116339758301184.jpg", "632312552317124608.jpg", "632501644470386688.jpg", "632521088361988096.jpg", "632521163915116544.png", "632521210229604352.png", "632524276438827008.jpg", "632524328979841024.jpg", "632586566840238081.png", "632595788998033408.jpg", "632660043434770432.jpg", "632796352304332800.jpg", "632796751927050240.jpg", "632801148252848128.png", "632954828809764864.jpg", "632971287031169024.jpg", "632971332607508480.jpg", "633077328941072384.png", "634111012965089280.jpg", "634120348243197953.gif", "634302104686804992.png", "634302158152597504.jpg", "634302189730496512.jpg", "634302256082288640.png", "634304890320076800.jpg", "634304929553661952.jpg", "634964901598806016.jpg", "635956907456249856.jpg", "637102324424310784.jpg", "640363961318096896.jpg", "645725342800199680.jpg", "651358973481697280.gif"];

const ribbon = document.getElementById('ribbon');
const hud = document.getElementById('hud');
const N = PHOTOS.length;

// Сборка ленты
const items = [];
{
  const frag = document.createDocumentFragment();
  for (const name of PHOTOS) {
    const li = document.createElement('li');
    const cell = document.createElement('div');
    cell.className = 'cell';
    const img = document.createElement('img');
    img.loading = 'lazy';
    img.decoding = 'async';
    img.draggable = false;
    img.src = BASE + encodeURIComponent(name);
    img.onload = () => cell.style.setProperty('--ar', (img.naturalWidth / img.naturalHeight).toFixed(4));
    cell.appendChild(img);
    li.appendChild(cell);
    frag.appendChild(li);
    items.push(li);
  }
  ribbon.appendChild(frag);
}

const MINI_PITCH = 110, MINI_HALF = 55; // ячейка 100 + зазор 10
const MORPH_MS = 600;

let mode = 'full';        // 'full' | 'mini' — куда ведёт морф
let index = 0;            // текущий кадр полного режима
let vh = window.innerHeight;

// Две виртуальные позиции ленты, каждая в своей геометрии; на экран идёт их смесь по e.
// Морф: m — линейный прогресс, e — сглаженный (ease), из e выводятся И высоты (--m), И сдвиг.
let m = 0, e = 0, mTarget = 0;
let yFull = 0, targetFull = 0;   // полная геометрия: шаг = vh
let yMini = 0, targetMini = 0;   // мини-геометрия: шаг = 110

const clampIndex = i => Math.max(0, Math.min(N - 1, i));
const miniTarget = i => vh / 2 - (i * MINI_PITCH + MINI_HALF);
function miniClamp(v) {
  const hi = vh / 2 - MINI_HALF;
  const lo = vh / 2 - ((N - 1) * MINI_PITCH + MINI_HALF);
  return Math.max(lo, Math.min(hi, v));
}
// Кадр, чей центр ближе всего к центру экрана (в мини-геометрии)
const nearestMini = () => clampIndex(Math.round((vh / 2 - yMini - MINI_HALF) / MINI_PITCH));
const ease = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

// Подгрузка соседей, чтобы шаг не упирался в ленивую загрузку
function preload(around) {
  for (let i = clampIndex(around - 2); i <= clampIndex(around + 2); i++) {
    items[i].querySelector('img').loading = 'eager';
  }
}

// ——— Скролл ———
// Полный режим: импульсный триггер — одна пауза между жестами = один шаг.
// Мини-режим: непрерывная протяжка ленты.
let acc = 0, lastWheel = 0, fired = false;
window.addEventListener('wheel', ev => {
  ev.preventDefault();
  if (mode === 'mini') {
    targetMini = miniClamp(targetMini - ev.deltaY);
    return;
  }
  const now = performance.now();
  if (now - lastWheel > 140) { acc = 0; fired = false; } // тишина = новый импульс
  lastWheel = now;
  if (fired) return;
  acc += ev.deltaY;
  if (Math.abs(acc) > 60) {
    index = clampIndex(index + Math.sign(acc));
    targetFull = -index * vh;
    preload(index);
    fired = true;
    acc = 0;
  }
}, { passive: false });

window.addEventListener('keydown', ev => {
  const step = { ArrowDown: 1, PageDown: 1, ArrowUp: -1, PageUp: -1 }[ev.key];
  if (!step) return;
  ev.preventDefault();
  if (mode === 'mini') {
    targetMini = miniClamp(targetMini - step * MINI_PITCH);
  } else {
    index = clampIndex(index + step);
    targetFull = -index * vh;
    preload(index);
  }
});

// ——— Боковые зоны ———
function enterMini() {
  if (mode === 'mini') return;
  mode = 'mini';
  mTarget = 1;
  ribbon.classList.add('mini');
  // мини-позиция стартует сразу в цели: при e≈0 её вес нулевой, смесь введёт её плавно
  targetMini = yMini = miniTarget(index);
}
function exitMini() {
  if (mode === 'full') return;
  index = nearestMini(); // выбор = кадр в центре
  mode = 'full';
  mTarget = 0;
  ribbon.classList.remove('mini');
  for (const li of items) {
    li.classList.remove('past', 'future', 'current');
    li._s = ''; li._c = false;
  }
  targetFull = yFull = -index * vh; // при e≈1 вес нулевой, смесь введёт плавно
  preload(index);
}
for (const z of [document.getElementById('zoneL'), document.getElementById('zoneR')]) {
  z.addEventListener('mouseenter', enterMini);
  z.addEventListener('mouseleave', exitMini);
}

// ——— Кадровый цикл: одни часы на морф, позиции и датчик past/future ———
let lastT = performance.now();
function frame(now) {
  const dt = Math.min(50, now - lastT);
  lastT = now;

  if (m !== mTarget) {
    m = Math.max(0, Math.min(1, m + Math.sign(mTarget - m) * dt / MORPH_MS));
    e = ease(m);
    ribbon.style.setProperty('--m', e.toFixed(4));
  }

  yFull += (targetFull - yFull) * 0.12;
  if (Math.abs(targetFull - yFull) < 0.3) yFull = targetFull;
  yMini += (targetMini - yMini) * 0.12;
  if (Math.abs(targetMini - yMini) < 0.3) yMini = targetMini;

  const y = (1 - e) * yFull + e * yMini;
  ribbon.style.transform = `translate3d(0, ${y.toFixed(2)}px, 0)`;

  if (e > 0) {
    // геометрия для датчика — та же смесь, что на экране
    const H = (1 - e) * vh + e * MINI_PITCH;
    const cur = nearestMini();
    for (let i = 0; i < N; i++) {
      const li = items[i];
      const top = i * H + y, bottom = top + H;
      const s = bottom < 0 ? 'past' : (top > vh ? 'future' : '');
      if (li._s !== s) {
        li.classList.remove('past', 'future');
        if (s) li.classList.add(s);
        li._s = s;
      }
      const c = i === cur;
      if (li._c !== c) { li.classList.toggle('current', c); li._c = c; }
    }
    hud.textContent = (cur + 1) + ' / ' + N;
  } else {
    hud.textContent = (index + 1) + ' / ' + N;
  }
  requestAnimationFrame(frame);
}

window.addEventListener('resize', () => {
  vh = window.innerHeight;
  targetFull = -index * vh;
  if (mode === 'mini') targetMini = miniClamp(miniTarget(nearestMini()));
});

preload(0);
requestAnimationFrame(frame);
</script>
