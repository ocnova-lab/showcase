<svg id="stage"></svg>
<script>
'use strict';

const SQRT3 = Math.sqrt(3);
const R = 81;       // радиус ячейки сетки
const INSET = 0.58; // шов 1px между соседями: видимый зазор = инсет × √3
const NS = 'http://www.w3.org/2000/svg';
const DIRS = [[1,0],[1,-1],[0,-1],[-1,0],[-1,1],[0,1]];
const ITEMS = ['Home', 'Projects', 'Courses', 'Texts', 'Contact'];

const svg = document.getElementById('stage');
const reducedMotion = matchMedia('(prefers-reduced-motion: reduce)');

let W = innerWidth, H = innerHeight;
let cells = [];          // cells[i] = [q, r] — ячейка элемента i (аксиальные координаты)
let hoverIdx = -1, selectedIdx = -1, lastKey = '';

// --- звук: лёгкий щелчок на появление элемента, синтез без внешних файлов ---

let audio = null;
function ensureAudio() {
  const Ctx = window.AudioContext || window.webkitAudioContext;
  if (!Ctx) return null;
  if (!audio) audio = new Ctx();
  if (audio.state === 'suspended') audio.resume();
  return audio;
}
// браузер держит звук запертым до первого жеста — отпираем при любом клике/клавише
addEventListener('pointerdown', ensureAudio);
addEventListener('keydown', ensureAudio);

function click(delay) {
  const ctx = ensureAudio();
  if (!ctx || ctx.state !== 'running') return;
  const t = ctx.currentTime + (delay || 0);

  // источник один: короткий шумовой импульс с резким спадом, без тона
  const len = Math.floor(ctx.sampleRate * 0.008);
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) {
    d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 3);
  }

  const master = ctx.createGain();
  master.gain.value = 0.6;
  master.connect(ctx.destination);

  // импульс через три узких резонанса — так «звенит» пластик под ногтем:
  // острый тик + среднее тело + едва слышный стук
  const bands = [
    { f: 4200, Q: 9,  g: 0.55 },
    { f: 1900, Q: 12, g: 0.4 },
    { f: 650,  Q: 8,  g: 0.25 }
  ];
  const jitter = 0.92 + Math.random() * 0.16; // каждый щелчок чуть свой
  for (const b of bands) {
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = b.f * jitter;
    bp.Q.value = b.Q;
    const g = ctx.createGain();
    g.gain.setValueAtTime(b.g, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.025);
    src.connect(bp).connect(g).connect(master);
    src.start(t);
  }
}

// --- геометрия гекс-сетки (pointy-top, аксиальные координаты) ---

function centerOf(q, r) {
  return { x: R * SQRT3 * (q + r / 2), y: R * 1.5 * r };
}

function cellAt(x, y) {
  const qf = (SQRT3 / 3 * x - y / 3) / R;
  const rf = (2 / 3 * y) / R;
  const sf = -qf - rf;
  let q = Math.round(qf), r = Math.round(rf), s = Math.round(sf);
  const dq = Math.abs(q - qf), dr = Math.abs(r - rf), ds = Math.abs(s - sf);
  if (dq > dr && dq > ds) q = -r - s;
  else if (dr > ds) r = -q - s;
  return [q, r];
}

const key = (q, r) => q + ',' + r;

function dist(a, b) {
  const dq = a[0] - b[0], dr = a[1] - b[1];
  return (Math.abs(dq) + Math.abs(dr) + Math.abs(dq + dr)) / 2;
}

// ячейка целиком видна на экране — только такие годятся элементам
function onScreen(q, r) {
  const c = centerOf(q, r);
  const mx = R * SQRT3 / 2, my = R;
  return c.x >= mx && c.x <= W - mx && c.y >= my && c.y <= H - my;
}

// курсор у кромки прижимается к ближайшей полностью видимой ячейке:
// элемент никогда не выходит за экран и не режется краем
function targetCell(x, y) {
  const mx = R * SQRT3 / 2, my = R;
  const cx = Math.min(Math.max(x, mx), W - mx);
  const cy = Math.min(Math.max(y, my), H - my);
  const cell = cellAt(cx, cy);
  if (onScreen(cell[0], cell[1])) return cell;
  let best = null, bd = Infinity;
  for (const [dq, dr] of DIRS) {
    const q = cell[0] + dq, r = cell[1] + dr;
    if (!onScreen(q, r)) continue;
    const c = centerOf(q, r);
    const d = Math.hypot(c.x - cx, c.y - cy);
    if (d < bd) { bd = d; best = [q, r]; }
  }
  return best || cell;
}

function hexPoints(cx, cy, rad) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 180 * (60 * i - 30);
    pts.push((cx + rad * Math.cos(a)).toFixed(2) + ',' + (cy + rad * Math.sin(a)).toFixed(2));
  }
  return pts.join(' ');
}

function connected(list) {
  const set = new Set(list.map(c => key(c[0], c[1])));
  const seen = new Set([key(list[0][0], list[0][1])]);
  const stack = [list[0]];
  while (stack.length) {
    const [q, r] = stack.pop();
    for (const [dq, dr] of DIRS) {
      const k = key(q + dq, r + dr);
      if (set.has(k) && !seen.has(k)) { seen.add(k); stack.push([q + dq, r + dr]); }
    }
  }
  return seen.size === set.size;
}

function centroidPx(list) {
  let x = 0, y = 0;
  for (const [q, r] of list) { const c = centerOf(q, r); x += c.x; y += c.y; }
  return { x: x / list.length, y: y / list.length };
}

// --- элементы: по узлу на пункт, позиции через transform ---

const els = ITEMS.map(label => {
  const outer = document.createElementNS(NS, 'g');
  const inner = document.createElementNS(NS, 'g');
  inner.setAttribute('class', 'hex');
  const p = document.createElementNS(NS, 'polygon');
  p.setAttribute('points', hexPoints(0, 0, R - INSET));
  const t = document.createElementNS(NS, 'text');
  t.setAttribute('dy', '0.35em');
  t.textContent = label;
  inner.appendChild(p);
  inner.appendChild(t);
  outer.appendChild(inner);
  svg.appendChild(outer);
  return { outer, inner };
});

// появление на новом месте: скейл из центра ячейки с фейдом
function pop(i) {
  if (reducedMotion.matches) return;
  els[i].inner.animate(
    [
      { opacity: 0, transform: 'scale(0.25)' },
      { opacity: 1, transform: 'scale(1)' }
    ],
    { duration: 260, easing: 'cubic-bezier(0.22, 1, 0.36, 1)' }
  );
}

// исчезновение со старого места: призрак уменьшается, гаснет
// и слегка сдвигается в сторону курсора
function ghost(fromCell, toX, toY, label) {
  if (reducedMotion.matches) return;
  const c = centerOf(fromCell[0], fromCell[1]);
  const outer = document.createElementNS(NS, 'g');
  outer.setAttribute('transform', 'translate(' + c.x + ' ' + c.y + ')');
  const inner = document.createElementNS(NS, 'g');
  inner.setAttribute('class', 'hex');
  const p = document.createElementNS(NS, 'polygon');
  p.setAttribute('points', hexPoints(0, 0, R - INSET));
  const t = document.createElementNS(NS, 'text');
  t.setAttribute('dy', '0.35em');
  t.textContent = label;
  inner.appendChild(p);
  inner.appendChild(t);
  outer.appendChild(inner);
  svg.insertBefore(outer, svg.firstChild); // под живыми элементами
  const dx = toX - c.x, dy = toY - c.y;
  const k = 26 / (Math.hypot(dx, dy) || 1);
  const anim = inner.animate(
    [
      { opacity: 0.9, transform: 'translate(0px, 0px) scale(1)' },
      { opacity: 0, transform: 'translate(' + dx * k + 'px, ' + dy * k + 'px) scale(0.2)' }
    ],
    { duration: 210, easing: 'cubic-bezier(0.5, 0, 0.65, 0.4)', fill: 'forwards' }
  );
  anim.onfinish = () => outer.remove();
}

// --- механика соты ---

// шаг-амёба: курсор вышел в соседнюю пустую ячейку,
// дальний элемент перескакивает в неё, связность оставшихся сохраняется
function step(cq, cr) {
  const order = cells.map((c, i) => i)
    .sort((a, b) => dist(cells[b], [cq, cr]) - dist(cells[a], [cq, cr]));
  for (const i of order) {
    const rest = cells.filter((_, j) => j !== i);
    if (connected([...rest, [cq, cr]])) { cells[i] = [cq, cr]; return true; }
  }
  return false;
}

// пересборка: курсор прыгнул далеко — сота собирается вокруг новой ячейки заново.
// Четыре места добираются жадным ростом от ячейки курсора: только полностью
// видимые ячейки, из них ближе к прежнему центру соты — у краёв и в углах
// сота сама складывается компактнее.
function growAround(cq, cr, focus) {
  const spots = [[cq, cr]];
  const taken = new Set([key(cq, cr)]);
  while (spots.length < 5) {
    let best = null, bestScore = Infinity;
    for (const [q, r] of spots) {
      for (const [dq, dr] of DIRS) {
        const nq = q + dq, nr = r + dr, k = key(nq, nr);
        if (taken.has(k)) continue;
        const c = centerOf(nq, nr);
        const score = (onScreen(nq, nr) ? 0 : 1e6) + Math.hypot(c.x - focus.x, c.y - focus.y);
        if (score < bestScore) { bestScore = score; best = [nq, nr]; }
      }
    }
    spots.push(best);
    taken.add(key(best[0], best[1]));
  }
  return spots;
}

function relocate(cq, cr) {
  const focus = cells.length ? centroidPx(cells) : centerOf(cq, cr);
  const spots = growAround(cq, cr, focus);
  const free = new Set(ITEMS.map((_, i) => i));
  const next = new Array(ITEMS.length);
  for (const [q, r] of spots) {
    let best = -1, bd = Infinity;
    for (const i of free) {
      const d = cells[i] ? dist(cells[i], [q, r]) : i;
      if (d < bd) { bd = d; best = i; }
    }
    free.delete(best);
    next[best] = [q, r];
  }
  cells = next;
}

// --- отрисовка ---

function render() {
  cells.forEach(([q, r], i) => {
    const c = centerOf(q, r);
    els[i].outer.setAttribute('transform', 'translate(' + c.x + ' ' + c.y + ')');
    els[i].inner.setAttribute('class',
      'hex' + (i === hoverIdx ? ' hover' : '') + (i === selectedIdx ? ' selected' : ''));
  });
}

// --- события ---

addEventListener('pointermove', e => {
  const [q, r] = targetCell(e.clientX, e.clientY);
  const k = key(q, r);
  if (k === lastKey) return;
  lastKey = k;
  const idx = cells.findIndex(c => c[0] === q && c[1] === r);
  if (idx >= 0) { hoverIdx = idx; render(); return; } // внутри соты — кластер стоит
  const before = cells.map(c => [c[0], c[1]]);
  const adjacent = cells.some(c => dist(c, [q, r]) === 1);
  if (!adjacent || !step(q, r)) relocate(q, r);
  hoverIdx = cells.findIndex(c => c[0] === q && c[1] === r);
  render();
  let moved = 0;
  cells.forEach((c, i) => {
    if (key(c[0], c[1]) !== key(before[i][0], before[i][1])) {
      ghost(before[i], e.clientX, e.clientY, ITEMS[i]);
      pop(i);
      click(moved * 0.015);
      moved++;
    }
  });
});

addEventListener('click', () => {
  if (hoverIdx < 0) return;
  selectedIdx = hoverIdx;
  render();
});

addEventListener('resize', () => {
  W = innerWidth;
  H = innerHeight;
  if (cells.some(([q, r]) => !onScreen(q, r))) {
    const c = centroidPx(cells);
    relocate(...targetCell(c.x, c.y));
  }
  render();
});

W = innerWidth;
H = innerHeight;
relocate(...targetCell(W / 2, H / 2));
render();
cells.forEach((_, i) => pop(i));
</script>
